name: Build Electron App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar Código
      uses: actions/checkout@v4
      
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Instalar Dependências
      run: npm install
        
    - name: Compilar o Executável (.exe)
      run: npm run build
        
    - name: Disponibilizar o Download
      uses: actions/upload-artifact@v4
      with:
        name: Auditoria-Premium-Windows
        path: dist/*.exe
